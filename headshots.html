<!DOCTYPE html>
<html lang="en">
<head>

  <title>Headshots | Sunfest Photos</title>

<body>
  <header class="site-header">

      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
            <!-- Sun circle -->
            <circle cx="50" cy="50" r="28" fill="none" stroke="#111" stroke-width="2.5"/>
            <!-- Sun rays -->
            <line x1="50" y1="12" x2="50" y2="4" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="50" y1="88" x2="50" y2="96" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="12" y1="50" x2="4" y2="50" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="88" y1="50" x2="96" y2="50" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

            <line x1="78" y1="78" x2="84" y2="84" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

        <div>

        <a href="index.html#portfolio">Portfolio</a>
        <a href="index.html#contact">Contact</a>
